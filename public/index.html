<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Softkomik Reader</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
    }

    .container { max-width: 1200px; margin: 0 auto; }

    .header {
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      padding: 20px;
      border-bottom: 2px solid #ff6b6b;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 { font-size: 24px; margin-bottom: 10px; }

    .search-bar {
      display: flex;
      gap: 10px;
    }

    .search-bar input {
      flex: 1;
      padding: 12px;
      background: #333;
      border: 1px solid #444;
      color: #e0e0e0;
      border-radius: 4px;
      font-size: 14px;
    }

    .search-bar button {
      padding: 12px 24px;
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }

    .search-bar button:hover { background: #ff5252; }

    .content {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 20px;
      padding: 20px;
      min-height: calc(100vh - 200px);
    }

    .sidebar {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 8px;
      height: fit-content;
      position: sticky;
      top: 100px;
    }

    .sidebar h3 {
      margin-bottom: 15px;
      color: #ff6b6b;
      font-size: 16px;
    }

    .chapter-list {
      max-height: 600px;
      overflow-y: auto;
    }

    .chapter-item {
      padding: 10px;
      margin-bottom: 5px;
      background: #222;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .chapter-item:hover {
      background: #ff6b6b;
      color: white;
    }

    .chapter-item.active {
      background: #ff6b6b;
      color: white;
      font-weight: 600;
    }

    .main-panel {
      background: #1a1a1a;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid #333;
      background: #0f0f0f;
    }

    .tab {
      flex: 1;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }

    .tab:hover { background: #222; }

    .tab.active {
      border-bottom-color: #ff6b6b;
      color: #ff6b6b;
      font-weight: 600;
    }

    .tab-content {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .tab-content.active { display: block; }

    .manga-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
    }

    .manga-card {
      background: #222;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .manga-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 16px rgba(255, 107, 107, 0.2);
    }

    .manga-card img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      background: #333;
    }

    .manga-card-info {
      padding: 12px;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .manga-card-title {
      font-weight: 600;
      font-size: 13px;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .reader-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .manga-info {
      background: #222;
      padding: 15px;
      border-radius: 8px;
    }

    .manga-info h2 { margin-bottom: 8px; font-size: 20px; }
    .manga-info p { font-size: 13px; color: #aaa; margin-bottom: 5px; }

    .chapter-viewer {
      background: #111;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }

    .chapter-viewer img {
      max-width: 100%;
      height: auto;
      margin-bottom: 10px;
      border-radius: 4px;
    }

    .chapter-nav {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .chapter-nav button {
      padding: 10px 20px;
      background: #333;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .chapter-nav button:hover {
      background: #ff6b6b;
      border-color: #ff6b6b;
      color: white;
    }

    .chapter-nav button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
    }

    .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid #333;
      border-top-color: #ff6b6b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      background: #8b0000;
      color: white;
      padding: 15px;
      border-radius: 4px;
      margin-top: 10px;
    }

    @media (max-width: 768px) {
      .content { grid-template-columns: 1fr; }
      .sidebar { position: relative; top: 0; }
      .manga-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="container">
      <h1>📚 Softkomik Reader</h1>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Cari manga...">
        <button onclick="searchManga()">Cari</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="content">
      <div class="sidebar">
        <h3 id="sidebarTitle">Search</h3>
        <div id="sidebarContent" class="chapter-list"></div>
      </div>

      <div class="main-panel">
        <div class="tabs">
          <div class="tab active" onclick="switchTab('search')">🔍 Search</div>
          <div class="tab" onclick="switchTab('reader')">📖 Reader</div>
          <div class="tab" onclick="switchTab('favorites')">⭐ Favorites</div>
        </div>

        <div id="search" class="tab-content active">
          <div id="searchResults" class="manga-grid"></div>
        </div>

        <div id="reader" class="tab-content">
          <div id="readerContent"></div>
        </div>

        <div id="favorites" class="tab-content">
          <div id="favoritesList" class="manga-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    let currentManga = null;
    let currentChapter = null;
    let allChapters = [];
    let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');

    async function searchManga() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;

      showLoading('searchResults');
      try {
        const res = await fetch(`${API_BASE}/scrape?action=search&query=${encodeURIComponent(query)}`);
        const data = await res.json();

        if (!Array.isArray(data)) throw new Error(data.error || 'Invalid response');

        document.getElementById('searchResults').innerHTML = data.map(m => `
          <div class="manga-card" onclick="selectManga('${m.id}', '${m.title.replace(/'/g, "\\'")}')">
            <img src="${m.cover || 'https://via.placeholder.com/150x200?text=No+Cover'}" alt="${m.title}" onerror="this.src='https://via.placeholder.com/150x200?text=No+Cover'">
            <div class="manga-card-info">
              <div class="manga-card-title">${m.title}</div>
            </div>
          </div>
        `).join('');
      } catch (error) {
        document.getElementById('searchResults').innerHTML = `<div class="error">${error.message}</div>`;
      }
    }

    async function selectManga(id, title) {
      currentManga = { id, title };
      showLoading('sidebarContent');
      document.getElementById('sidebarTitle').textContent = title;

      try {
        const res = await fetch(`${API_BASE}/scrape?action=chapters&query=${id}`);
        const chapters = await res.json();

        if (!Array.isArray(chapters)) throw new Error(chapters.error);

        allChapters = chapters;
        document.getElementById('sidebarContent').innerHTML = chapters.map((ch, i) => `
          <div class="chapter-item" onclick="readChapter('${id}', '${ch.id}', ${i})" title="${ch.title}">
            ${ch.title}
          </div>
        `).join('');

        if (chapters.length > 0) readChapter(id, chapters[0].id, 0);
      } catch (error) {
        document.getElementById('sidebarContent').innerHTML = `<div class="error">${error.message}</div>`;
      }
    }

    async function readChapter(mangaId, chapterId, index) {
      currentChapter = { mangaId, chapterId, index };
      switchTab('reader');
      
      showLoading('readerContent');

      try {
        const res = await fetch(`${API_BASE}/scrape?action=chapter&mangaId=${mangaId}&chapterId=${chapterId}`);
        const data = await res.json();

        if (data.error) throw new Error(data.error);

        const prevBtn = index > 0 ? `<button onclick="prevChapter()">← Chapter Sebelumnya</button>` : '<button disabled>← Chapter Sebelumnya</button>';
        const nextBtn = index < allChapters.length - 1 ? `<button onclick="nextChapter()">Chapter Berikutnya →</button>` : '<button disabled>Chapter Berikutnya →</button>';

        const html = `
          <div class="reader-container">
            <div class="manga-info">
              <h2>${currentManga.title}</h2>
              <p>${data.mangaId} - Chapter ${index + 1}/${allChapters.length}</p>
              <p>Total: ${data.totalPages} halaman</p>
            </div>
            <div class="chapter-viewer">
              ${data.images.map((img, i) => `
                <div>
                  <img src="${img.url}" alt="Page ${img.page}" loading="lazy">
                  <small>Halaman ${img.page}/${data.totalPages}</small>
                </div>
              `).join('')}
            </div>
            <div class="chapter-nav">
              ${prevBtn}
              <button onclick="toggleFavorite()">⭐ Add Favorite</button>
              ${nextBtn}
            </div>
          </div>
        `;

        document.getElementById('readerContent').innerHTML = html;
      } catch (error) {
        document.getElementById('readerContent').innerHTML = `<div class="error">${error.message}</div>`;
      }
    }

    function nextChapter() {
      if (currentChapter.index < allChapters.length - 1) {
        const nextIndex = currentChapter.index + 1;
        const nextChap = allChapters[nextIndex];
        readChapter(currentManga.id, nextChap.id, nextIndex);
      }
    }

    function prevChapter() {
      if (currentChapter.index > 0) {
        const prevIndex = currentChapter.index - 1;
        const prevChap = allChapters[prevIndex];
        readChapter(currentManga.id, prevChap.id, prevIndex);
      }
    }

    function toggleFavorite() {
      if (!currentManga) return;
      const exists = favorites.find(f => f.id === currentManga.id);
      if (exists) {
        favorites = favorites.filter(f => f.id !== currentManga.id);
        alert('Removed from favorites');
      } else {
        favorites.push(currentManga);
        alert('Added to favorites');
      }
      localStorage.setItem('favorites', JSON.stringify(favorites));
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      
      event.target.classList.add('active');
      document.getElementById(tabName).classList.add('active');

      if (tabName === 'favorites') {
        loadFavorites();
      }
    }

    function loadFavorites() {
      const html = favorites.map(f => `
        <div class="manga-card" onclick="selectManga('${f.id}', '${f.title.replace(/'/g, "\\'")}')">
          <div class="manga-card-info" style="background: #ff6b6b; color: white; height: 200px; justify-content: center; align-items: center; text-align: center;">
            <div class="manga-card-title">${f.title}</div>
          </div>
        </div>
      `).join('');
      
      document.getElementById('favoritesList').innerHTML = html || '<p style="grid-column: 1/-1; text-align: center; color: #888;">No favorites yet</p>';
    }

    function showLoading(elementId) {
      document.getElementById(elementId).innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    }

    document.getElementById('searchInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') searchManga();
    });
  </script>
</body>
</html>
