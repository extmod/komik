<!DOCTYPE html>
<html>
<body>

<button onclick="load()">Load Manga</button>
<div id="app"></div>

<script>
async function load() {
  const res = await fetch("/api/scrape");
  const data = await res.json();

  document.getElementById("app").innerHTML =
    data.map(d => `
      <div>
        <img src="${d.img}" width="100"/>
        <p>${d.title}</p>
      </div>
    `).join("");
}
</script>

</body>
</html>
